version: '3.8'

services:
  app:
    image: nginx:latest
    container_name: app-teste
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - database

  database:
    image: postgres:16
    container_name: postgres-teste
    environment:
      POSTGRES_DB: aplicacao
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
